<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0f0f1a"/>
  <!-- Hourglass shape -->
  <path d="M9 6h14l-6 8.5 6 8.5H9l6-8.5z" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Sand top -->
  <path d="M11 7.5h10l-4 5.5z" fill="#a78bfa" opacity="0.5"/>
  <!-- Sand bottom (almost full) -->
  <path d="M10.5 23.5h11l-3-4h-5z" fill="#a78bfa"/>
  <!-- Hourglass frame top/bottom bars -->
  <line x1="8" y1="6" x2="24" y2="6" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8" y1="26" x2="24" y2="26" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>
</svg>
